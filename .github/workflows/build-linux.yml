name: Build Linux Packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libdrm2 \
            libxkbcommon-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libgbm-dev \
            libxss1 \
            libasound2-dev \
            libgtk-3-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-dri3-0

      - name: Install npm dependencies
        run: npm ci

      - name: Build Electron App
        run: |
          echo "Building for linux x86_64..."
          npm run make -- --platform linux --arch x86_64
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: List build output
        run: |
          echo "Checking build output directories..."
          ls -la out/ 2>/dev/null || echo "No out directory found"
          find . -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" | head -10 || echo "No package files found"

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts

          # Copy all generated packages from out/make directory
          if [ -d "out/make" ]; then
            echo "Found out/make directory, copying files..."
            cp out/make/* artifacts/ 2>/dev/null || echo "No files in out/make"
          else
            echo "out/make directory not found, searching for packages..."
          fi

          # Also check for any package files in the workspace
          find . -maxdepth 3 \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.AppImage" \) -exec cp {} artifacts/ \; 2>/dev/null || true

          echo "Contents of artifacts directory:"
          ls -la artifacts/

          # Check if we have any files
          if [ "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "Artifacts collected successfully"
          else
            echo "No artifacts found - build may have failed"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-packages
          path: artifacts/*
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libdrm2 \
            libxkbcommon-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libgbm-dev \
            libxss1 \
            libasound2-dev \
            libgtk-3-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-dri3-0

      - name: Install npm dependencies
        run: npm ci

      - name: Build Electron App
        run: |
          echo "Building for linux arm64..."
          npm run make -- --platform linux --arch arm64
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: List build output
        run: |
          echo "Checking build output directories..."
          ls -la out/ 2>/dev/null || echo "No out directory found"
          find . -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" | head -10 || echo "No package files found"

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts

          # Copy all generated packages from out/make directory
          if [ -d "out/make" ]; then
            echo "Found out/make directory, copying files..."
            cp out/make/* artifacts/ 2>/dev/null || echo "No files in out/make"
          else
            echo "out/make directory not found, searching for packages..."
          fi

          # Also check for any package files in the workspace
          find . -maxdepth 3 \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.AppImage" \) -exec cp {} artifacts/ \; 2>/dev/null || true

          echo "Contents of artifacts directory:"
          ls -la artifacts/

          # Check if we have any files
          if [ "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "Artifacts collected successfully"
          else
            echo "No artifacts found - build may have failed"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-packages
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-packages
          path: artifacts/x86_64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-packages
          path: artifacts/arm64

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}