name: Build Linux Packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run make
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Copy all generated packages from out/make directory
          if [ -d "out/make" ]; then
            cp out/make/* artifacts/ 2>/dev/null || echo "No files in out/make"
          fi
          # Also check for any .deb, .rpm files in the workspace
          find . -maxdepth 2 -name "*.deb" -o -name "*.rpm" | xargs -I {} cp {} artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-packages
          path: artifacts/*
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run make
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Copy all generated packages from out/make directory
          if [ -d "out/make" ]; then
            cp out/make/* artifacts/ 2>/dev/null || echo "No files in out/make"
          fi
          # Also check for any .deb, .rpm files in the workspace
          find . -maxdepth 2 -name "*.deb" -o -name "*.rpm" | xargs -I {} cp {} artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-packages
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-packages
          path: artifacts/x86_64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-packages
          path: artifacts/arm64

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}